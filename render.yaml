services:
  - type: web
    name: auan-api
    runtime: node
    rootDir: .
    buildCommand: |
      pnpm install --no-frozen-lockfile --prod=false
      cd apps/api && npx prisma@6 generate && cd ..
      pnpm --filter @auan/api build
      cd apps/api && npx prisma@6 migrate deploy
    startCommand: node apps/api/dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: STAFF_JWT_SECRET
        sync: false
      - key: LINE_CHANNEL_ID
        sync: false
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_MESSAGING_ACCESS_TOKEN
        sync: false
      - key: LIFF_ID
        sync: false
      - key: OWNER_LINE_USER_IDS
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: JWT_COOKIE_SECURE
        value: "true"
