# ──────────────────────────────────────────────────────────────
# Auan-Auan-Platform — Nginx Configuration
#
# Production reverse proxy + static file server
# Designed to run behind Cloudflare Free Tier
# ──────────────────────────────────────────────────────────────

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # Performance
    sendfile    on;
    tcp_nopush  on;
    keepalive_timeout 65;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Cloudflare real IP (trust CF-Connecting-IP header)
    include /etc/nginx/cloudflare.conf;

    # Upstream backend
    upstream api {
        server api:3000;
    }

    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://profile.line-scdn.net; font-src 'self'; connect-src 'self' https://api.line.me https://access.line.me;" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # Custom error pages
        error_page 502 503 504 /50x.html;

        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }

        # Cache static assets (regex beats prefix in nginx)
        # Matches: /assets/*.js, /admin/assets/*.js, etc.
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            root /usr/share/nginx/html;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Redirect /admin → /admin/
        location = /admin {
            return 301 /admin/;
        }

        # Admin SPA fallback
        location /admin/ {
            alias /usr/share/nginx/html/admin/;
            index index.html;
            try_files $uri $uri/ /admin/index.html;
        }

        # API proxy
        location /api/ {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Payment slip uploads
            client_max_body_size 10m;
        }

        # Health check (no logging)
        location = /api/v1/health {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            access_log off;
        }

        # Customer SPA (catch-all)
        root /usr/share/nginx/html/customer;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # Deny hidden files
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
