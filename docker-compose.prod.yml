# ──────────────────────────────────────────────────────────────
# Auan-Auan-Platform — Production Docker Compose
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d --build
#   docker compose -f docker-compose.prod.yml down
#
# HTTPS handled by Cloudflare Free Tier in front.
# This stack serves HTTP on port 80.
# ──────────────────────────────────────────────────────────────

services:
  postgres:
    image: postgres:16-alpine
    container_name: auan-postgres
    restart: unless-stopped
    command: >
      postgres
      -c shared_buffers=256MB
      -c work_mem=4MB
      -c effective_cache_size=512MB
      -c max_connections=100
      -c random_page_cost=1.1
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-auan_platform}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    expose:
      - "5432"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 1024M

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: auan-api
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    expose:
      - "3000"
    volumes:
      - uploads:/app/uploads
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: auan-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./apps/customer/dist:/usr/share/nginx/html/customer:ro
      - ./apps/admin/dist:/usr/share/nginx/html/admin:ro
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  postgres_data:
  uploads:
